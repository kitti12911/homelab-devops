[defaults]
inventory = inventory/
private_key_file = ~/.ssh/id_ed25519_ansible
interpreter_python = auto_silent
result_format = yaml
host_key_checking = false
vault_password_file = .vault_password

# Run all hosts in parallel (default is 5)
forks = 20


[ssh_connection]
# Keep control socket alive for the full playbook duration
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
pipelining = true