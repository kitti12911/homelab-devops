- name: Setup proxy node (Envoy)
  hosts: proxy
  become: true
  gather_facts: true
  gather_subset:
      - hardware
      - min

  vars:
      envoy_config_dir: "/etc/envoy"
      envoy_config_path: "{{ envoy_config_dir }}/envoy.yaml"
      envoy_service_name: "envoy"
      traefik_http_port: 32755
      traefik_https_port: 30880
      traefik_otlp_grpc_port: 32442
      postgresql_nodeport: 30432
      nats_nodeport: 30422
      dragonfly_nodeport: 30379
      # redpanda_kafka_nodeport: 31092
      envoy_log_level: "warning"
      envoy_apt_suite: "{{ 'bookworm' if ansible_facts.distribution_release == 'trixie' else ansible_facts.distribution_release }}"
      node_exporter_systemd_unit_exclude: '^(openipmi|smartmontools)\.service$'
      node_exporter_args: >-
          --web.listen-address=:9100
          --log.level=warn
          --collector.systemd.unit-exclude={{ node_exporter_systemd_unit_exclude }}
      proxy_sysctl_config_path: /etc/sysctl.d/99-proxy-tuning.conf

  handlers:
      - name: Restart CPU Governor Performance
        ansible.builtin.systemd:
            name: cpu-governor-performance
            state: restarted
            daemon_reload: true

      - name: Restart Envoy
        ansible.builtin.systemd:
            name: "{{ envoy_service_name }}"
            state: restarted
            daemon_reload: true

      - name: Restart Node Exporter
        ansible.builtin.systemd:
            name: prometheus-node-exporter
            state: restarted
            daemon_reload: true

  tasks:
      - name: Set proxy hardware-derived tuning variables
        ansible.builtin.set_fact:
            proxy_sysctl_min_free_kbytes: "{{ '131072' if ansible_facts['memtotal_mb'] >= 7000 else '65536' if ansible_facts['memtotal_mb'] >= 3000 else '32768' }}"
            proxy_sysctl_conntrack_max: "{{ '524288' if ansible_facts['memtotal_mb'] >= 7000 else '262144' if ansible_facts['memtotal_mb'] >= 3000 else '131072' }}"
            proxy_sysctl_conntrack_buckets: "{{ '131072' if ansible_facts['memtotal_mb'] >= 7000 else '65536' if ansible_facts['memtotal_mb'] >= 3000 else '32768' }}"
            proxy_sysctl_dirty_ratio: "{{ {'nvme': '30', 'usb_ssd': '20', 'sata_ssd': '20', 'sd': '10'}[hw_storage_type] }}"
            proxy_sysctl_dirty_background_ratio: "{{ {'nvme': '15', 'usb_ssd': '10', 'sata_ssd': '10', 'sd': '5'}[hw_storage_type] }}"

      - name: Deploy CPU governor performance service
        ansible.builtin.copy:
            dest: /etc/systemd/system/cpu-governor-performance.service
            mode: "0644"
            content: |
                [Unit]
                Description=Set CPU governor to performance
                After=multi-user.target

                [Service]
                Type=oneshot
                ExecStart=/bin/sh -c 'for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do [ -w "$f" ] && echo performance > "$f"; done'
                RemainAfterExit=yes

                [Install]
                WantedBy=multi-user.target
        notify: Restart CPU Governor Performance

      - name: Enable CPU governor performance service
        ansible.builtin.systemd:
            name: cpu-governor-performance
            enabled: true
            state: started
            daemon_reload: true

      - name: Create Envoy config directory
        ansible.builtin.file:
            path: "{{ envoy_config_dir }}"
            state: directory
            mode: "0755"

      - name: Create APT keyrings directory
        ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

      - name: Add Envoy APT signing key
        ansible.builtin.get_url:
            url: https://apt.envoyproxy.io/signing.key
            dest: /tmp/envoy-signing.key
            mode: "0644"

      - name: Install Envoy signing key into keyring
        ansible.builtin.shell: gpg --dearmor -o /etc/apt/keyrings/envoy-keyring.gpg < /tmp/envoy-signing.key
        args:
            creates: /etc/apt/keyrings/envoy-keyring.gpg

      - name: Remove temporary signing key
        ansible.builtin.file:
            path: /tmp/envoy-signing.key
            state: absent

      - name: Add Envoy APT repository
        ansible.builtin.apt_repository:
            repo: "deb [arch={{ ansible_facts.architecture | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/envoy-keyring.gpg] https://apt.envoyproxy.io {{ envoy_apt_suite }} main"
            filename: envoy
            state: present

      - name: Update apt cache
        ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

      - name: Install Envoy
        ansible.builtin.apt:
            name: envoy
            state: present

      - name: Install node exporter
        ansible.builtin.apt:
            name: prometheus-node-exporter
            state: present

      - name: Remove legacy Envoy load sysctl file
        ansible.builtin.file:
            path: /etc/sysctl.d/99-envoy-load.conf
            state: absent

      - name: Load nf_conntrack module for proxy tuning
        ansible.builtin.modprobe:
            name: nf_conntrack
            state: present

      - name: Ensure nf_conntrack loads at boot
        ansible.builtin.lineinfile:
            path: /etc/modules
            line: nf_conntrack
            create: true
            mode: "0644"

      - name: Tune proxy kernel parameters
        ansible.posix.sysctl:
            name: "{{ item.key }}"
            value: "{{ item.value }}"
            sysctl_file: "{{ proxy_sysctl_config_path }}"
            sysctl_set: true
            state: present
            reload: true
        loop:
            # --- File system ---
            - { key: fs.inotify.max_user_watches, value: "524288" }
            - { key: fs.inotify.max_user_instances, value: "1024" }
            - { key: fs.file-max, value: "1048576" }

            # --- Network - backlog and queues ---
            - { key: net.ipv4.tcp_max_syn_backlog, value: "65535" }
            - { key: net.core.somaxconn, value: "65535" }
            - { key: net.core.netdev_max_backlog, value: "4096" }

            # --- Network - connection tracking ---
            - {
                  key: net.netfilter.nf_conntrack_max,
                  value: "{{ proxy_sysctl_conntrack_max }}"
              }
            - {
                  key: net.netfilter.nf_conntrack_buckets,
                  value: "{{ proxy_sysctl_conntrack_buckets }}"
              }

            # --- Network - connection lifecycle ---
            - { key: net.ipv4.tcp_fin_timeout, value: "30" }
            - { key: net.ipv4.tcp_max_tw_buckets, value: "400000" }
            - { key: net.ipv4.tcp_tw_reuse, value: "1" }
            - { key: net.ipv4.tcp_keepalive_time, value: "120" }
            - { key: net.ipv4.tcp_keepalive_intvl, value: "15" }
            - { key: net.ipv4.tcp_keepalive_probes, value: "5" }

            # --- Network - memory and buffers ---
            - { key: net.ipv4.ip_local_port_range, value: "1024 65535" }
            - { key: net.ipv4.tcp_max_orphans, value: "16384" }
            - { key: net.core.rmem_max, value: "4194304" }
            - { key: net.core.wmem_max, value: "4194304" }
            - { key: net.ipv4.tcp_rmem, value: "4096 87380 4194304" }
            - { key: net.ipv4.tcp_wmem, value: "4096 65536 4194304" }

            # --- Network - throughput ---
            - { key: net.ipv4.tcp_fastopen, value: "1" }
            - { key: net.ipv4.tcp_slow_start_after_idle, value: "0" }
            - { key: net.ipv4.tcp_mtu_probing, value: "1" }

            # --- Network - security hardening ---
            - { key: net.ipv4.tcp_syncookies, value: "1" }
            - { key: net.ipv4.conf.all.accept_redirects, value: "0" }
            - { key: net.ipv4.conf.default.accept_redirects, value: "0" }
            - { key: net.ipv4.conf.all.send_redirects, value: "0" }
            - { key: net.ipv4.conf.all.accept_source_route, value: "0" }
            - { key: net.ipv4.conf.default.accept_source_route, value: "0" }
            - { key: net.ipv4.conf.all.log_martians, value: "1" }
            - { key: net.ipv4.icmp_echo_ignore_broadcasts, value: "1" }

            # --- VM / memory ---
            - { key: vm.swappiness, value: "10" }
            - { key: vm.panic_on_oom, value: "0" }
            - { key: vm.overcommit_memory, value: "1" }
            - { key: vm.min_free_kbytes, value: "{{ proxy_sysctl_min_free_kbytes }}" }
            - { key: vm.dirty_ratio, value: "{{ proxy_sysctl_dirty_ratio }}" }
            - {
                  key: vm.dirty_background_ratio,
                  value: "{{ proxy_sysctl_dirty_background_ratio }}"
              }

            # --- Kernel ---
            - { key: kernel.pid_max, value: "4194304" }
            - { key: kernel.dmesg_restrict, value: "1" }

      - name: Configure node exporter with quiet logging
        ansible.builtin.copy:
            content: |
                ARGS="{{ node_exporter_args }}"
            dest: /etc/default/prometheus-node-exporter
            mode: "0644"
        notify: Restart Node Exporter

      - name: Create node exporter systemd override directory
        ansible.builtin.file:
            path: /etc/systemd/system/prometheus-node-exporter.service.d
            state: directory
            mode: "0755"

      - name: Limit node exporter journal noise
        ansible.builtin.copy:
            content: |
                [Service]
                StandardOutput=journal
                StandardError=journal
                LogRateLimitIntervalSec=30s
                LogRateLimitBurst=5
            dest: /etc/systemd/system/prometheus-node-exporter.service.d/logging.conf
            mode: "0644"
        notify: Restart Node Exporter

      - name: Remove existing Envoy config
        ansible.builtin.file:
            path: "{{ envoy_config_path }}"
            state: absent

      - name: Deploy Envoy config (after install so package default is overwritten)
        ansible.builtin.template:
            src: envoy.yaml.j2
            dest: "{{ envoy_config_path }}"
            mode: "0644"
        notify: Restart Envoy

      - name: Deploy Envoy systemd unit (minimal logging for SD card)
        ansible.builtin.template:
            src: envoy.service.j2
            dest: "/etc/systemd/system/{{ envoy_service_name }}.service"
            mode: "0644"
        notify: Restart Envoy

      - name: Enable and start Envoy
        ansible.builtin.systemd:
            name: "{{ envoy_service_name }}"
            state: started
            enabled: true
            daemon_reload: true

      - name: Enable and start node exporter
        ansible.builtin.systemd:
            name: prometheus-node-exporter
            state: started
            enabled: true
            daemon_reload: true
