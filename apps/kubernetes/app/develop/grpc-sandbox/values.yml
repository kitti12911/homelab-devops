image:
    repository: zot.lan/kitti12911/grpc-sandbox
    tag: "v1.7.0-beta.2"
    digest: "sha256:bf014c8532920677b644eb9311db08ef286f17530c154fd2b58275f7ddeae08f"
    pullPolicy: IfNotPresent

replicaCount: 4

imagePullSecrets:
    - name: zot-pull

env:
    - name: GOMEMLIMIT
      value: 220MiB

resources:
    requests:
        cpu: 50m
        memory: 64Mi
    limits:
        memory: 256Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: grpc-sandbox
              app.kubernetes.io/instance: grpc-sandbox

configSecret:
    create: false
    name: grpc-sandbox-config

probes:
    readiness:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    service:
        port: 50051
