image:
    repository: zot.lan/homelab/grpc-sandbox
    tag: "v1.4.0-beta.3"
    digest: "sha256:03081859e0ce9b265ee15c36e8407de56561f5237a0c85624d7e78ec7a6c60f3"
    pullPolicy: IfNotPresent

replicaCount: 2

imagePullSecrets:
    - name: zot-pull

gomemlimit:
    enabled: true
    percentage: 90

resources:
    requests:
        cpu: 50m
        memory: 64Mi
    limits:
        memory: 384Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: grpc-sandbox
              app.kubernetes.io/instance: grpc-sandbox

configSecret:
    create: false
    name: grpc-sandbox-config

probes:
    readiness:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    service:
        port: 50051
