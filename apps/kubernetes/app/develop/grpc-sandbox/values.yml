image:
    repository: zot.lan/homelab/grpc-sandbox
    tag: "v1.8.0-beta.2"
    digest: "sha256:323c729afe380460698783f32cd0475611643b4ae5e7b3947dbdf402289145a6"
    pullPolicy: IfNotPresent

replicaCount: 2

autoscaling:
    enabled: false
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

imagePullSecrets:
    - name: zot-pull

gomemlimit:
    enabled: true
    percentage: 90

resources:
    requests:
        cpu: 100m
        memory: 64Mi
    limits:
        memory: 384Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: grpc-sandbox
              app.kubernetes.io/instance: grpc-sandbox

configSecret:
    create: false
    name: grpc-sandbox-config

probes:
    readiness:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    service:
        port: 50051
