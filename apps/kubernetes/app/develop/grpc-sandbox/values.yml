image:
    repository: zot.lan/homelab/grpc-sandbox
    tag: "v1.12.0-beta.3"
    digest: "sha256:efc6f04c1493d087715381dab9a5db096feb1754970ddb92b958977e6f4f5b91"
    pullPolicy: IfNotPresent

replicaCount: 2

autoscaling:
    enabled: false
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

imagePullSecrets:
    - name: zot-pull

gomemlimit:
    enabled: true
    percentage: 90

resources:
    requests:
        cpu: 100m
        memory: 64Mi
    limits:
        memory: 384Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: grpc-sandbox
              app.kubernetes.io/instance: grpc-sandbox

secretEnv:
    enabled: true
    name: grpc-sandbox-secrets

probes:
    readiness:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    database: 
        database: user_service

