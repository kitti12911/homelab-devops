image:
    repository: ghcr.io/kitti12911/grpc-sandbox
    tag: "v2.0.0-beta.1"
    digest: "sha256:df001202bba01f79f0d7f649b1c83208b432931ed34c591dc2c3d629d0248e99"
    pullPolicy: IfNotPresent

replicaCount: 2

autoscaling:
    enabled: false
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

gomemlimit:
    enabled: true
    percentage: 90

resources:
    requests:
        cpu: 100m
        memory: 64Mi
    limits:
        memory: 384Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: grpc-sandbox
              app.kubernetes.io/instance: grpc-sandbox

secretEnv:
    enabled: true
    name: grpc-sandbox-secrets

probes:
    readiness:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    database:
        database: user_service
