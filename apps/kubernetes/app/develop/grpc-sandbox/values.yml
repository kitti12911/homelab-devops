image:
    repository: zot.lan/kitti12911/grpc-sandbox
    tag: "v1.1.0"
    digest: "sha256:cdcd74d7b64ff2d338651dc7341c601c56abb177521fdb92689c1c13db4e418b"
    pullPolicy: IfNotPresent

replicaCount: 1

imagePullSecrets:
    - name: zot-pull

resources:
    requests:
        cpu: 50m
        memory: 64Mi
    limits:
        memory: 256Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: grpc-sandbox
              app.kubernetes.io/instance: grpc-sandbox

configSecret:
    create: false
    name: grpc-sandbox-config

probes:
    readiness:
        enabled: true
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    service:
        port: 50051
