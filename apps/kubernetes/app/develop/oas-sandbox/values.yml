image:
    repository: zot.lan/kitti12911/oas-sandbox
    tag: "v1.6.0-beta.1"
    digest: "sha256:e4a5dbf03bb2b1d760f39da93924cfc87698aaaab57f2ed72c04cb241cf79f17"
    pullPolicy: IfNotPresent

imagePullSecrets:
    - name: zot-pull

configSecret:
    create: false
    name: oas-sandbox-config

probes:
    readiness:
        enabled: true
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
    liveness:
        enabled: true
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 20
        timeoutSeconds: 3
        failureThreshold: 3

config:
    service:
        port: 8080

httpRoute:
    enabled: true
    hostnames:
        - oas-sandbox.lan
    parentRefs:
        - name: traefik
          namespace: default
          group: gateway.networking.k8s.io
          kind: Gateway
          sectionName: https
