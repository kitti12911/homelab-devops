apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: worker-sandbox
    namespace: argocd
spec:
    project: develop-apps
    sources:
        - repoURL: https://github.com/kitti12911/helm-sandbox.git
          targetRevision: main
          path: charts/worker-sandbox
          helm:
              releaseName: worker-sandbox
              valueFiles:
                  - $values/apps/kubernetes/app/develop/worker-sandbox/values.yml
        - repoURL: https://github.com/kitti12911/homelab-devops.git
          targetRevision: main
          ref: values
        - repoURL: https://github.com/kitti12911/homelab-devops.git
          targetRevision: main
          path: apps/kubernetes/app/develop/worker-sandbox
    destination:
        server: https://kubernetes.default.svc
        namespace: sandbox
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
