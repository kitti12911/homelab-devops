image:
    repository: zot.lan/homelab/worker-sandbox
    tag: "v1.5.1-beta.1"
    digest: "sha256:780100850e93058fe11f046f6b38be4b01cb5356850feab8e5de22e790178290"
    pullPolicy: IfNotPresent

replicaCount: 1

imagePullSecrets:
    - name: zot-pull

gomemlimit:
    enabled: true
    percentage: 90

resources:
    requests:
        cpu: 25m
        memory: 64Mi
    limits:
        memory: 256Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: worker-sandbox
              app.kubernetes.io/instance: worker-sandbox

configSecret:
    create: false
    name: worker-sandbox-config
