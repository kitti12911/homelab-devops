image:
    repository: ghcr.io/kitti12911/worker-sandbox
    tag: "v1.6.0-beta.3"
    digest: "sha256:ed3fad849648ea7650e7452a9a12b5b1f544472eaee1d1d1bdce2180ceba3159"
    pullPolicy: IfNotPresent

replicaCount: 1

gomemlimit:
    enabled: true
    percentage: 90

resources:
    requests:
        cpu: 25m
        memory: 64Mi
    limits:
        memory: 256Mi

topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
          matchLabels:
              app.kubernetes.io/name: worker-sandbox
              app.kubernetes.io/instance: worker-sandbox

configSecret:
    create: false
    name: worker-sandbox-config
