apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: develop-apps
    namespace: argocd
spec:
    project: default
    source:
        repoURL: git@github.com:kitti12911/homelab-devops.git
        targetRevision: main
        path: apps/kubernetes/app/develop
    destination:
        server: https://kubernetes.default.svc
        namespace: argocd
    syncPolicy:
        automated:
            selfHeal: true
