apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cloudflared
    namespace: argocd
spec:
    project: platform
    source:
        repoURL: git@github.com:kitti12911/homelab-devops.git
        targetRevision: main
        path: infrastructure/kubernetes/app/cloudflared-manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: cloudflare-system
    syncPolicy:
        syncOptions:
            - CreateNamespace=true
