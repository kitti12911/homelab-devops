apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: seaweedfs
    namespace: argocd
spec:
    project: registry
    sources:
        - repoURL: https://seaweedfs.github.io/seaweedfs/helm
          chart: seaweedfs
          targetRevision: "4.22.0"
          helm:
              valuesObject:
                  global:
                      replicationPlacement: "000"
                      monitoring:
                          enabled: true
                      enableReplication: false

                  master:
                      enabled: true
                      replicas: 1
                      volumeSizeLimitMB: 1000
                      defaultReplication: "000"

                      affinity: ""

                      nodeSelector: |
                          node-role.kubernetes.io/object-storage: "true"

                      tolerations: |
                          - key: dedicated
                            operator: Equal
                            value: object-storage
                            effect: NoSchedule

                      data:
                          type: "persistentVolumeClaim"
                          size: "1Gi"
                          storageClass: "local-path"

                      logs:
                          type: "emptyDir"

                      resources:
                          requests:
                              cpu: "100m"
                              memory: "128Mi"
                          limits:
                              memory: "384Mi"

                      extraEnvironmentVars:
                          GOMEMLIMIT: "345MiB"
                          WEED_MASTER_VOLUME_GROWTH_COPY_1: "7"
                          WEED_MASTER_VOLUME_GROWTH_COPY_2: "6"
                          WEED_MASTER_VOLUME_GROWTH_COPY_3: "3"
                          WEED_MASTER_VOLUME_GROWTH_COPY_OTHER: "1"

                  volume:
                      enabled: true
                      replicas: 1
                      minFreeSpacePercent: 7
                      compactionMBps: "30"

                      affinity: ""

                      nodeSelector: |
                          node-role.kubernetes.io/object-storage: "true"

                      tolerations: |
                          - key: dedicated
                            operator: Equal
                            value: object-storage
                            effect: NoSchedule

                      dataDirs:
                          - name: data
                            type: "persistentVolumeClaim"
                            size: "75Gi"
                            storageClass: "local-path"
                            maxVolumes: 0

                      idx: {}

                      logs:
                          type: "emptyDir"

                      resources:
                          requests:
                              cpu: "200m"
                              memory: "256Mi"
                          limits:
                              memory: "768Mi"

                      extraEnvironmentVars:
                          GOMEMLIMIT: "690MiB"

                  filer:
                      enabled: true
                      replicas: 1
                      defaultReplicaPlacement: "000"
                      encryptVolumeData: true

                      affinity: ""

                      nodeSelector: |
                          node-role.kubernetes.io/object-storage: "true"

                      tolerations: |
                          - key: dedicated
                            operator: Equal
                            value: object-storage
                            effect: NoSchedule

                      data:
                          type: "persistentVolumeClaim"
                          size: "5Gi"
                          storageClass: "local-path"

                      logs:
                          type: "emptyDir"

                      resources:
                          requests:
                              cpu: "200m"
                              memory: "192Mi"
                          limits:
                              memory: "512Mi"

                      extraEnvironmentVars:
                          GOMEMLIMIT: "460MiB"
                          WEED_LEVELDB2_ENABLED: "true"
                          WEED_FILER_OPTIONS_RECURSIVE_DELETE: "false"
                          WEED_FILER_BUCKETS_FOLDER: "/buckets"

                      s3:
                          enabled: true
                          port: 8333
                          enableAuth: true
                          existingConfigSecret: seaweedfs-s3-auth

                  s3:
                      enabled: false

                  admin:
                      enabled: true
                      replicas: 1

                      podAnnotations:
                          reloader.stakater.com/auto: "true"

                      affinity: ""

                      nodeSelector: |
                          node-role.kubernetes.io/object-storage: "true"

                      tolerations: |
                          - key: dedicated
                            operator: Equal
                            value: object-storage
                            effect: NoSchedule

                      data:
                          type: "emptyDir"

                      logs:
                          type: "emptyDir"

                      resources:
                          requests:
                              cpu: "50m"
                              memory: "64Mi"
                          limits:
                              memory: "128Mi"

                      service:
                          type: ClusterIP
        - repoURL: git@github.com:kitti12911/homelab-devops.git
          targetRevision: main
          path: infrastructure/kubernetes/app/seaweedfs-manifests
    destination:
        server: https://kubernetes.default.svc
        namespace: seaweedfs
    syncPolicy:
        managedNamespaceMetadata:
            labels:
                gateway-access: "true"
        syncOptions:
            - CreateNamespace=true
