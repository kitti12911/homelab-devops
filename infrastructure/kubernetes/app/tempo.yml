apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: tempo
      targetRevision: "1.24.4"
      helm:
        valuesObject:
          tempo:
            retention: 168h

            extraEnv:
              - name: GOMEMLIMIT
                value: "460MiB"

            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: "0.0.0.0:4317"
                  http:
                    endpoint: "0.0.0.0:4318"

            resources:
              requests:
                cpu: 100m
                memory: 192Mi
              limits:
                memory: 512Mi

            metricsGenerator:
              enabled: true
              remoteWriteUrl: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"

          # TODO: uncomment it when joining kilo node
          # nodeSelector:
          #   node-role.kubernetes.io/object-storage: "true"

          persistence:
            enabled: true
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            size: 10Gi

          serviceMonitor:
            enabled: true

    - repoURL: git@github.com:kitti12911/homelab-devops.git
      targetRevision: main
      path: infrastructure/kubernetes/app/tempo-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        gateway-access: "true"
    syncOptions:
      - CreateNamespace=true
